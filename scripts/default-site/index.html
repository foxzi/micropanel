<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>404 — Site not found</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #0f172a;
    --fg: #e2e8f0;
    --muted: #94a3b8;
    --accent: #38bdf8;
    --card: rgba(255, 255, 255, 0.04);
    --border: rgba(255, 255, 255, 0.08);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, "Helvetica Neue", sans-serif;
    background:
      radial-gradient(1200px 600px at 10% -10%, rgba(56, 189, 248, 0.18), transparent 60%),
      radial-gradient(900px 500px at 110% 10%, rgba(168, 85, 247, 0.15), transparent 60%),
      var(--bg);
    color: var(--fg);
    display: grid;
    place-items: center;
    padding: 2rem;
    -webkit-font-smoothing: antialiased;
  }
  main {
    max-width: 540px;
    width: 100%;
    padding: 2.5rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
    text-align: center;
  }
  .code {
    font-size: clamp(4rem, 12vw, 6rem);
    font-weight: 700;
    letter-spacing: -0.05em;
    line-height: 1;
    background: linear-gradient(135deg, var(--accent), #a855f7);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin: 0 0 0.5rem;
  }
  h1 {
    font-size: 1.4rem;
    font-weight: 600;
    margin: 0 0 0.75rem;
  }
  p {
    color: var(--muted);
    line-height: 1.6;
    margin: 0 0 1rem;
    font-size: 0.95rem;
  }
  .hint {
    margin-top: 1.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
    font-size: 0.8rem;
    color: var(--muted);
  }
  .hint code {
    background: rgba(255, 255, 255, 0.06);
    padding: 0.1rem 0.4rem;
    border-radius: 4px;
    font-size: 0.8rem;
  }
</style>
</head>
<body>
  <main>
    <div class="code">404</div>
    <h1>Site not found</h1>
    <p>The domain you requested is not configured on this server.</p>
    <p>If you just pointed DNS here, please add the site in your control panel.</p>
    <div class="hint">Powered by <code>MicroPanel</code></div>
  </main>
</body>
</html>

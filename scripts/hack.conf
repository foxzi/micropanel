# Fix for files with encoded query strings (%3F) in URLs
# After nginx decodes %3F -> ?, the URI becomes e.g. main.css?a321.css
# Nginx treats decoded ? as part of URI path (not query string separator).
#
# Two cases exist:
# 1) File on disk HAS literal ? in name (e.g. jquery.min.js?ver=3.7.1)
#    -> serve it with correct MIME type (types{} + default_type)
# 2) File on disk does NOT have ? in name (e.g. main.css exists, but URL is main.css%3Fa321.css)
#    -> try the file without ?... suffix via rewrite
#
# try_files $uri handles case 1, rewrite handles case 2.

location ~* "\.(js|mjs)\?" {
    types { }
    default_type application/javascript;
    try_files $uri @strip_query;
}

location ~* "\.css\?" {
    types { }
    default_type text/css;
    try_files $uri @strip_query;
}

location ~* "\.html?\?" {
    types { }
    default_type text/html;
    try_files $uri @strip_query;
}

location ~* "\.(woff2?|ttf|eot|otf)\?" {
    types { }
    default_type font/woff2;
    try_files $uri @strip_query;
}

location ~* "\.svg\?" {
    types { }
    default_type image/svg+xml;
    try_files $uri @strip_query;
}

location ~* "\.(jpe?g|png|gif|webp|ico)\?" {
    try_files $uri @strip_query;
}

# Named location: strip everything after ? in decoded URI path and retry
location @strip_query {
    rewrite ^(.+)\?.*$ $1 last;
}

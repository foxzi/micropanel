# Fix Content-Type for files with encoded query strings (%3F) in filenames
# After nginx decodes %3F -> ?, the URI becomes e.g. jquery.min.js?ver=3.7.1
# Nginx treats ? as part of URI path (not query string), finds file on disk,
# but determines MIME type from the suffix after ? -> octet-stream.
# These locations match .ext? pattern and force correct Content-Type.

location ~* "\.(js|mjs)\?" {
    types { }
    default_type application/javascript;
    try_files $uri =404;
}

location ~* "\.css\?" {
    types { }
    default_type text/css;
    try_files $uri =404;
}

location ~* "\.html?\?" {
    types { }
    default_type text/html;
    try_files $uri =404;
}

location ~* "\.(woff2?|ttf|eot|otf)\?" {
    types { }
    default_type font/woff2;
    try_files $uri =404;
}

location ~* "\.svg\?" {
    types { }
    default_type image/svg+xml;
    try_files $uri =404;
}

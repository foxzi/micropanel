# MicroPanel default server - catches requests for unknown domains.
# Installed to /etc/nginx/conf.d/00-micropanel-default.conf
# Returns 404 with a friendly page for any host not matched by other server blocks.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Allow ACME HTTP-01 challenges for any domain (webroot mode)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    root /usr/share/micropanel/default-site;

    location = / {
        return 404;
    }

    location / {
        return 404;
    }

    error_page 404 /index.html;
    location = /index.html {
        internal;
    }
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name _;

    ssl_certificate     /etc/micropanel/ssl/default.crt;
    ssl_certificate_key /etc/micropanel/ssl/default.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/micropanel/default-site;

    location = / {
        return 404;
    }

    location / {
        return 404;
    }

    error_page 404 /index.html;
    location = /index.html {
        internal;
    }
}

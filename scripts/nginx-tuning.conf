# MicroPanel - Nginx tuning
# Installed to /etc/nginx/conf.d/micropanel.conf

# Support long domain names (aliases, subdomains)
server_names_hash_bucket_size 128;

# Default upload limit for deploy archives (matches micropanel limits.max_zip_size)
client_max_body_size 100M;

# Proxy timeouts for panel backend
proxy_connect_timeout 60s;
proxy_send_timeout    120s;
proxy_read_timeout    120s;

# Gzip compression for static sites
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
